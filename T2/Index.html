<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tocapu T2 - Escáner AR</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
    <style> body { margin: 0; overflow: hidden; } </style>
</head>
<body>

    <a-scene mindar-image="imageTargetSrc: ./targets.mind;" color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
        <a-entity mindar-image-target="targetIndex: 0" id="target-t2"></a-entity>
    </a-scene>

    <script>
        const targetEl = document.querySelector('#target-t2');
        targetEl.addEventListener("targetFound", event => {
            // Redirección directa al catálogo de FlipHTML5
            window.location.href = "https://fliphtml5.com/es/";
        });
    </script>

</body>
</html>
