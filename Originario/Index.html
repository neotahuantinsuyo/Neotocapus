<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Espejo Retrograbado - Realidad Aumentada</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
    
    <style>
        body { margin: 0; overflow: hidden; }
    </style>
</head>
<body>

    <a-scene mindar-image="imageTargetSrc: ./targets.mind;" color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
        
        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity mindar-image-target="targetIndex: 0" id="mi-target">
        </a-entity>
        
    </a-scene>

    <script>
        // Este script detecta cuando el diseño es escaneado por la cámara
        const targetEl = document.querySelector('#mi-target');
        
        targetEl.addEventListener("targetFound", event => {
            // En cuanto lo encuentra, te lleva directo a tu FlipHTML5 principal
            window.location.href = "https://fliphtml5.com/es/";
        });
    </script>

</body>
</html>
